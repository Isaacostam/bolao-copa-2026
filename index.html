<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolão Copa 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Poppins',sans-serif;background:#f3f4f6;color:#1f2937;padding:24px 16px}
.container{max-width:1200px;margin:0 auto}
h1{color:#1b365d;text-align:center;font-size:24px;font-weight:700;margin-bottom:4px}
.sub{text-align:center;color:#6b7280;font-size:12px;margin-bottom:18px}
.tabs{display:flex;gap:8px;justify-content:center;margin-bottom:20px}
.tab{padding:9px 26px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:2px solid #1b365d;background:white;color:#1b365d;transition:all .15s}
.tab.active{background:#1b365d;color:white}
.page{display:none}.page.active{display:block}
.legend{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-bottom:14px;font-size:11px;color:#4b5563}
.legend span{display:flex;align-items:center;gap:4px}
.search-box{width:100%;padding:10px 14px;margin-bottom:14px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:14px;font-family:inherit;outline:none}
.search-box:focus{border-color:#1b365d}
.card{background:white;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.07)}
table{width:100%;border-collapse:collapse}
thead tr{background:#1b365d}
th{padding:11px 10px;font-size:11px;font-weight:600;color:white;text-align:center;white-space:nowrap;letter-spacing:.03em}
th.left{text-align:left}
td{padding:10px;border-bottom:1px solid #f0f0f0;font-size:13px;text-align:center}
td.left{text-align:left;font-weight:500}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f8faff}
tr.p1 td{background:#fff8e1}tr.p2 td{background:#f5f5f5}tr.p3 td{background:#fff3e0}
.pts{font-weight:700;color:#1b365d}
.badge{display:inline-block;min-width:26px;padding:2px 7px;border-radius:999px;font-size:11px;font-weight:600}
.bA{background:#dcfce7;color:#166534}.bB{background:#fef9c3;color:#854d0e}
.bC{background:#dbeafe;color:#1e40af}.bD{background:#fee2e2;color:#991b1b}

/* TABELA PALPITES — jogos nas linhas, pessoas nas colunas */
.pw{overflow-x:auto}
#pt{min-width:600px;table-layout:auto}
#pt thead th{white-space:nowrap;padding:10px 8px;font-size:11px}
#pt thead th.nome-th{text-align:left;min-width:180px;position:sticky;left:0;z-index:3;background:#1b365d}
#pt td.jogo-col{text-align:left;font-weight:500;font-size:11px;white-space:nowrap;padding:8px 12px;position:sticky;left:0;background:white;z-index:1;border-right:2px solid #e5e7eb;max-width:220px}
#pt tr:hover td{background:#f8faff}
#pt tr:hover td.jogo-col{background:#f8faff}
#pt td.resultado-real{font-weight:700;color:#1b365d;background:#eef2ff;font-size:12px}
.cA{background:#dcfce7;color:#166534;font-size:11px;font-weight:600;border-radius:4px;padding:2px 4px}
.cB{background:#fef9c3;color:#854d0e;font-size:11px;font-weight:600;border-radius:4px;padding:2px 4px}
.cC{background:#dbeafe;color:#1e40af;font-size:11px;font-weight:600;border-radius:4px;padding:2px 4px}
.cD{background:#fee2e2;color:#991b1b;font-size:11px;font-weight:600;border-radius:4px;padding:2px 4px}
.cX{color:#9ca3af;font-size:11px}
.filtros{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.filtros select{padding:8px 12px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:13px;font-family:inherit;outline:none}
</style>
</head>
<body>
<div class="container">
  <h1>🏆 Bolão Copa do Mundo 2026</h1>
  <p class="sub">Atualizado automaticamente</p>
  <div class="tabs">
    <div class="tab active" onclick="showPage('ranking',this)">📊 Ranking</div>
    <div class="tab" onclick="showPage('palpites',this)">🎯 Palpites</div>
  </div>

  <!-- RANKING -->
  <div id="page-ranking" class="page active">
    <div class="legend">
      <span><span class="badge bA">A</span>Placar exato — 25 pts</span>
      <span><span class="badge bB">B</span>Vencedor + um gol — 15 pts</span>
      <span><span class="badge bC">C</span>Apenas vencedor — 10 pts</span>
      <span><span class="badge bD">D</span>Errou — 0 pts</span>
    </div>
    <input type="text" id="searchRanking" class="search-box" onkeyup="filtrarRanking()" placeholder="🔎 Buscar participante...">
    <div class="card">
      <table id="rankingTable">
        <thead><tr>
          <th style="width:52px">POS</th><th class="left">PARTICIPANTE</th>
          <th>PONTOS</th>
          <th><span class="badge bA">A</span></th>
          <th><span class="badge bB">B</span></th>
          <th><span class="badge bC">C</span></th>
          <th><span class="badge bD">D</span></th>
        </tr></thead>
        <tbody id="rankingBody"></tbody>
      </table>
    </div>
  </div>

  <!-- PALPITES -->
  <div id="page-palpites" class="page">
    <div class="filtros">
      <select id="jogoFiltro" onchange="renderPalpites()">
        <option value="disputados">Apenas jogos disputados</option>
        <option value="todos">Todos os jogos (1–72)</option>
      </select>
      <input type="text" id="searchPalpites" class="search-box"
             style="flex:1;min-width:180px;margin:0"
             onkeyup="filtrarPalpites()" placeholder="🔎 Buscar participante...">
    </div>
    <div class="pw card">
      <table id="pt">
        <thead id="ptHead"></thead>
        <tbody id="ptBody"></tbody>
      </table>
    </div>
    <p style="font-size:11px;color:#9ca3af;margin-top:10px;text-align:center">
      🟢 Placar exato &nbsp;|&nbsp; 🟡 Vencedor + gol &nbsp;|&nbsp; 🔵 Só vencedor &nbsp;|&nbsp; 🔴 Errou &nbsp;|&nbsp; — Não disputado
    </p>
  </div>
</div>

// ── TABS ──
function showPage(id, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  el.classList.add('active');
  if (id === 'palpites') renderPalpites();
}

// ── RANKING ──
const medalha = p => p===1?'🥇':p===2?'🥈':p===3?'🥉':p+'º';
const rb = document.getElementById('rankingBody');
RANKING.forEach((r,i) => {
  const pos=i+1, cl=pos<=3?`p${pos}`:'';
  rb.innerHTML += `<tr class="${cl}">
    <td style="font-weight:700">${medalha(pos)}</td>
    <td class="left">${r.Nome}</td>
    <td class="pts">${r.Points} pts</td>
    <td><span class="badge bA">${r.A}</span></td>
    <td><span class="badge bB">${r.B}</span></td>
    <td><span class="badge bC">${r.C}</span></td>
    <td><span class="badge bD">${r.D}</span></td>
  </tr>`;
});
function filtrarRanking() {
  const v = document.getElementById('searchRanking').value.toUpperCase();
  document.querySelectorAll('#rankingTable tbody tr').forEach(tr => {
    tr.style.display = tr.cells[1].textContent.toUpperCase().includes(v) ? '' : 'none';
  });
}

// ── PALPITES (jogos = linhas, pessoas = colunas) ──
function renderPalpites() {
  const filtro = document.getElementById('jogoFiltro').value;
  const jogosVisiveis = Object.keys(JOGOS).map(Number).filter(jn =>
    filtro === 'todos' || (GABARITO[jn] !== null && GABARITO[jn] !== undefined)
  );

  // Cabeçalho: "Jogo" + "Resultado Real" + um th por pessoa
  const head = document.getElementById('ptHead');
  head.innerHTML = '<tr>' +
    '<th class="nome-th">Jogo</th>' +
    '<th style="background:#2a4a7f;min-width:90px">Resultado Real</th>' +
    NOMES.map(n => `<th style="min-width:80px">${n}</th>`).join('') +
    '</tr>';

  // Corpo: uma linha por jogo
  const body = document.getElementById('ptBody');
  body.innerHTML = '';
  jogosVisiveis.forEach(jn => {
    const gab = GABARITO[jn];
    let row = `<tr>`;
    row += `<td class="jogo-col"><span style="color:#9ca3af;font-size:10px;margin-right:4px">J${jn}</span>${JOGOS[jn]}</td>`;
    row += `<td class="resultado-real">${gab ?? '—'}</td>`;
    NOMES.forEach(nome => {
      const d = (PALPITES[nome] || {})[jn];
      if (!d || !d.p) { row += `<td class="cX">—</td>`; return; }
      const cl = d.cat === '-' ? 'cX' : `c${d.cat}`;
      row += `<td class="${cl}">${d.p}</td>`;
    });
    row += '</tr>';
    body.innerHTML += row;
  });
}

function filtrarPalpites() {
  const v = document.getElementById('searchPalpites').value.toUpperCase();
  if (!v) {
    // Mostrar todas as colunas
    document.querySelectorAll('#pt thead th, #pt tbody td').forEach(el => el.style.display = '');
    return;
  }
  // Encontrar índices das colunas que batem com o nome (col 0 = jogo, col 1 = gabarito, col 2+ = pessoas)
  const ths = document.querySelectorAll('#pt thead tr th');
  const visivel = [true, true];  // jogo e gabarito sempre visíveis
  NOMES.forEach((n, i) => visivel.push(n.toUpperCase().includes(v)));
  ths.forEach((th, i) => th.style.display = visivel[i] ? '' : 'none');
  document.querySelectorAll('#pt tbody tr').forEach(tr => {
    tr.querySelectorAll('td').forEach((td, i) => td.style.display = visivel[i] ? '' : 'none');
  });
}
